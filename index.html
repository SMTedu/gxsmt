<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMT培训中心</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }
header { background:#1976d2; color:white; text-align:center; padding:40px; }
nav { background:#0d47a1; text-align:center; padding:10px; }
nav a { color:white; margin:0 15px; text-decoration:none; }

.container { max-width:1000px; margin:auto; background:white; padding:30px; }

h2 { border-left:5px solid #1976d2; padding-left:10px; }

.course { background:#eef3fa; padding:15px; margin:10px 0; border-radius:8px; }

.gallery img {
  width: 100%;
  margin-top:10px;
  border-radius:8px;
}

form input, form textarea {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  background:#ff9800;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  font-size:16px;
  border-radius:5px;
}

footer { text-align:center; padding:20px; background:#ddd; margin-top:20px; }
</style>
</head>

<body>

<header>
  <h1>SMT培训中心</h1>
  <p>实战型SMT工程师培训</p>
</header>

<nav>
  <a href="#courses">课程</a>
  <a href="#equipment">设备</a>
  <a href="#signup">报名</a>
</nav>

<div class="container">

<h2 id="courses">课程体系</h2>

<div class="course">
  <h3>SMT基础班</h3>
  <p>SMT流程、设备认知、元件知识</p>
</div>

<div class="course">
  <h3>工程师实战班</h3>
  <p>贴片机编程、回流焊、AOI分析</p>
</div>

<h2 id="equipment">设备展示</h2>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc">
  <img src="https://images.unsplash.com/photo-1581091870627-3c47b2c6f9b4">
  <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789">
</div>

<h2 id="signup">报名表单</h2>

<form action="https://formspree.io/f/你的ID" method="POST">
  <input type="text" name="name" placeholder="姓名" required>
  <input type="tel" name="phone" placeholder="电话" required>
  <input type="email" name="email" placeholder="邮箱">
  
  <textarea name="message" placeholder="想学习的内容"></textarea>

  <button type="submit">提交报名</button>
</form>

</div>

<footer>
  <p>© 2026 SMT培训中心</p>
</footer>

</body>
</html>
